# Publish package to the npm registry
name: Publish package to npm

on:
  # Run the workflow when a new tag is pushed starting with `v`
  # push:
  #  tags:
  #    - 'v*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    if: github.repository == 'skirtles-code/create-vue-lib'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Set up Node
        uses: actions/setup-node@v48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm --filter "@skirtle/create-vue-lib" run build
      - name: Publish
        run: pnpm --filter "@skirtle/create-vue-lib" publish
  docs:
    needs: publish
    uses: ./.github/workflows/pages.yml
